{% extends "main_layout.html" %}

{% block title %}Edit Comment — Papuan Thought{% endblock %}

{% block content %}
<div>
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-xl font-semibold text-neutral-100">Edit Comment</h1>
    <a href="{% url 'essays:detail' username=comment.essay.author.username slug=comment.essay.slug %}"
      class="text-xs text-neutral-500 hover:text-neutral-300 transition-colors">Cancel</a>
  </div>

  <div class="mb-6 pb-6 border-b border-neutral-800">
    <p class="text-xs text-neutral-600 mb-1">On essay</p>
    <a href="{% url 'essays:detail' username=comment.essay.author.username slug=comment.essay.slug %}"
      class="text-sm text-neutral-400 hover:text-neutral-200 transition-colors">
      {{ comment.essay.title }}
    </a>
  </div>

  <form method="post" class="flex flex-col gap-4">
    {% csrf_token %}
    <div class="flex flex-col gap-1">
      <label for="content" class="text-xs text-neutral-400 uppercase tracking-wider">Your comment</label>
      <textarea id="content" name="content" rows="5" required
        class="bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-sm text-neutral-100 focus:outline-none focus:border-neutral-500 transition-colors resize-none leading-relaxed">{{ comment.content }}</textarea>
    </div>
    <div class="flex items-center gap-3">
      <button type="submit"
        class="bg-neutral-100 text-neutral-900 font-medium text-sm rounded px-4 py-2 hover:bg-neutral-200 transition-colors">
        Save
      </button>
      <a href="{% url 'essays:detail' username=comment.essay.author.username slug=comment.essay.slug %}"
        class="text-sm text-neutral-500 hover:text-neutral-300 transition-colors">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
