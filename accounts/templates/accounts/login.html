{% extends "base_layout.html" %}

{% block title %}Login — Papuan Thought{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-12">
  <h1 class="text-2xl font-semibold text-neutral-100 mb-1">Sign in</h1>
  <p class="text-sm text-neutral-500 mb-8">Use your username or email address.</p>

  {% if error %}
    <p class="text-sm text-red-400 bg-red-400/10 border border-red-400/20 rounded px-3 py-2 mb-6">{{ error }}</p>
  {% endif %}

  <form method="post" class="flex flex-col gap-4">
    {% csrf_token %}
    <div class="flex flex-col gap-1">
      <label for="credential" class="text-xs text-neutral-400 uppercase tracking-wider">Username or Email</label>
      <input
        id="credential" name="credential" type="text" required autocomplete="username"
        class="bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-500 transition-colors"
      />
    </div>
    <div class="flex flex-col gap-1">
      <label for="password" class="text-xs text-neutral-400 uppercase tracking-wider">Password</label>
      <input
        id="password" name="password" type="password" required autocomplete="current-password"
        class="bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-500 transition-colors"
      />
    </div>
    <button type="submit" class="bg-neutral-100 text-neutral-900 font-medium text-sm rounded px-4 py-2 hover:bg-neutral-200 transition-colors mt-2">
      Sign in
    </button>
  </form>

  <p class="text-sm text-neutral-500 mt-6 text-center">
    No account?
    <a href="{% url 'accounts:register' %}" class="text-neutral-300 hover:text-neutral-100 transition-colors">Join the community</a>
  </p>
</div>
{% endblock %}
