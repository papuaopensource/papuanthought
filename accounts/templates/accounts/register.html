{% extends "base_layout.html" %}

{% block title %}Join — Papuan Thought{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-12">
  <h1 class="text-2xl font-semibold text-neutral-100 mb-1">Join the community</h1>
  <p class="text-sm text-neutral-500 mb-8">Create your account to write and participate.</p>

  {% if error %}
    <p class="text-sm text-red-400 bg-red-400/10 border border-red-400/20 rounded px-3 py-2 mb-6">{{ error }}</p>
  {% endif %}

  <form method="post" class="flex flex-col gap-4">
    {% csrf_token %}
    <div class="flex flex-col gap-1">
      <label for="username" class="text-xs text-neutral-400 uppercase tracking-wider">Username</label>
      <input
        id="username" name="username" type="text" required autocomplete="username"
        class="bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-500 transition-colors"
      />
    </div>
    <div class="flex flex-col gap-1">
      <label for="email" class="text-xs text-neutral-400 uppercase tracking-wider">Email</label>
      <input
        id="email" name="email" type="email" required autocomplete="email"
        class="bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-500 transition-colors"
      />
    </div>
    <div class="flex flex-col gap-1">
      <label for="password" class="text-xs text-neutral-400 uppercase tracking-wider">Password</label>
      <input
        id="password" name="password" type="password" required autocomplete="new-password"
        class="bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-500 transition-colors"
      />
    </div>
    <button type="submit" class="bg-neutral-100 text-neutral-900 font-medium text-sm rounded px-4 py-2 hover:bg-neutral-200 transition-colors mt-2">
      Create account
    </button>
  </form>

  <p class="text-sm text-neutral-500 mt-6 text-center">
    Already a member?
    <a href="{% url 'accounts:login' %}" class="text-neutral-300 hover:text-neutral-100 transition-colors">Sign in</a>
  </p>
</div>
{% endblock %}
