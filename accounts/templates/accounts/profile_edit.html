{% extends "main_layout.html" %}

{% block title %}Edit Profile — Papuan Thought{% endblock %}

{% block content %}
<div>
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-xl font-semibold text-neutral-100">Edit Profile</h1>
    <a href="{% url 'accounts:profile' username=user.username %}" class="text-xs text-neutral-500 hover:text-neutral-300 transition-colors">Cancel</a>
  </div>

  <form method="post" enctype="multipart/form-data" class="flex flex-col gap-5">
    {% csrf_token %}

    <!-- Photo -->
    <div class="flex items-center gap-4">
      <div class="w-14 h-14 rounded-full bg-neutral-800 flex items-center justify-center text-base font-semibold text-neutral-400 overflow-hidden shrink-0">
        {% if profile.photo %}
          <img src="{{ profile.photo.url }}" alt="Photo" class="w-full h-full object-cover" />
        {% else %}
          {{ user.first_name|first|upper }}{{ user.last_name|first|upper }}
        {% endif %}
      </div>
      <div class="flex flex-col gap-1">
        <label for="photo" class="text-xs text-neutral-400 uppercase tracking-wider">Profile Photo</label>
        <input id="photo" name="photo" type="file" accept="image/*"
          class="text-xs text-neutral-500 file:mr-3 file:text-xs file:border file:border-neutral-700 file:rounded file:px-2 file:py-1 file:bg-transparent file:text-neutral-400 hover:file:text-neutral-200 hover:file:border-neutral-500 file:transition-colors cursor-pointer" />
      </div>
    </div>

    <hr class="border-neutral-800" />

    <!-- Name -->
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-1">
        <label for="first_name" class="text-xs text-neutral-400 uppercase tracking-wider">First Name</label>
        <input id="first_name" name="first_name" type="text" value="{{ user.first_name }}"
          class="bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-sm text-neutral-100 focus:outline-none focus:border-neutral-500 transition-colors" />
      </div>
      <div class="flex flex-col gap-1">
        <label for="last_name" class="text-xs text-neutral-400 uppercase tracking-wider">Last Name</label>
        <input id="last_name" name="last_name" type="text" value="{{ user.last_name }}"
          class="bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-sm text-neutral-100 focus:outline-none focus:border-neutral-500 transition-colors" />
      </div>
    </div>

    <!-- Bio -->
    <div class="flex flex-col gap-1">
      <label for="bio" class="text-xs text-neutral-400 uppercase tracking-wider">Bio</label>
      <textarea id="bio" name="bio" rows="3"
        class="bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-500 transition-colors resize-none leading-relaxed"
        placeholder="A short bio about yourself">{{ profile.bio }}</textarea>
    </div>

    <!-- Location -->
    <div class="flex flex-col gap-1">
      <label for="location" class="text-xs text-neutral-400 uppercase tracking-wider">Location</label>
      <input id="location" name="location" type="text" value="{{ profile.location }}"
        placeholder="e.g. Jayapura, Papua"
        class="bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-500 transition-colors" />
    </div>

    <!-- Website -->
    <div class="flex flex-col gap-1">
      <label for="website" class="text-xs text-neutral-400 uppercase tracking-wider">Website</label>
      <input id="website" name="website" type="url" value="{{ profile.website }}"
        placeholder="https://yourwebsite.com"
        class="bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-500 transition-colors" />
    </div>

    <!-- Social -->
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-1">
        <label for="twitter" class="text-xs text-neutral-400 uppercase tracking-wider">Twitter / X</label>
        <div class="flex items-center bg-neutral-800 border border-neutral-700 rounded overflow-hidden focus-within:border-neutral-500 transition-colors">
          <span class="px-3 text-xs text-neutral-600">@</span>
          <input id="twitter" name="twitter" type="text" value="{{ profile.twitter }}"
            placeholder="username"
            class="flex-1 bg-transparent py-2 pr-3 text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none" />
        </div>
      </div>
      <div class="flex flex-col gap-1">
        <label for="instagram" class="text-xs text-neutral-400 uppercase tracking-wider">Instagram</label>
        <div class="flex items-center bg-neutral-800 border border-neutral-700 rounded overflow-hidden focus-within:border-neutral-500 transition-colors">
          <span class="px-3 text-xs text-neutral-600">@</span>
          <input id="instagram" name="instagram" type="text" value="{{ profile.instagram }}"
            placeholder="username"
            class="flex-1 bg-transparent py-2 pr-3 text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none" />
        </div>
      </div>
    </div>

    <div class="flex items-center gap-3 pt-2 border-t border-neutral-800 mt-2">
      <button type="submit"
        class="bg-neutral-100 text-neutral-900 font-medium text-sm rounded px-4 py-2 hover:bg-neutral-200 transition-colors">
        Save changes
      </button>
      <a href="{% url 'accounts:profile' username=user.username %}"
        class="text-sm text-neutral-500 hover:text-neutral-300 transition-colors">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
