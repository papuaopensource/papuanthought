{% extends "main_layout.html" %}

{% block title %}Write — Papuan Thought{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
<style>
  .EasyMDEContainer { display: flex; flex-direction: column; }
  .EasyMDEContainer .CodeMirror {
    background: var(--bg-surface);
    color: var(--color-body);
    border: 1px solid var(--border-base);
    border-top: none;
    border-radius: 0 0 6px 6px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.8;
    padding: 16px 20px;
    min-height: 480px;
  }
  .EasyMDEContainer .CodeMirror-scroll { min-height: 480px; }
  .EasyMDEContainer .CodeMirror-cursor { border-color: var(--color-body); }
  .EasyMDEContainer .CodeMirror-selected { background: var(--bg-muted); }
  .editor-toolbar {
    background: var(--bg-elevated);
    border: 1px solid var(--border-base);
    border-radius: 6px 6px 0 0;
    padding: 4px 8px;
    opacity: 1;
  }
  .editor-toolbar button {
    color: var(--color-body) !important;
    border-radius: 4px;
    width: 28px;
    height: 28px;
  }
  .editor-toolbar button:hover,
  .editor-toolbar button.active {
    background: var(--bg-muted) !important;
    border-color: transparent !important;
  }
  .editor-toolbar i.separator { border-color: var(--border-base); }
  .editor-preview, .editor-preview-side {
    background: var(--bg-base);
    color: var(--color-body);
    border-color: var(--border-base);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.8;
    padding: 20px 24px;
  }
  .editor-preview pre, .editor-preview-side pre {
    background: var(--bg-elevated);
    border: 1px solid var(--border-base);
    border-radius: 4px;
    padding: 12px;
  }
  .editor-preview-side { border-left-color: var(--border-base); }
  .editor-statusbar { color: #737373; border-top-color: var(--border-base); font-size: 11px; }
  .cm-s-easymde .cm-header { color: var(--color-body); font-weight: 600; }
  .cm-s-easymde .cm-url, .cm-s-easymde .cm-link { color: #737373; }
  .cm-s-easymde .cm-comment { color: #919191; }
</style>
{% endblock %}

{% block content %}
<div>
  <h1 class="text-xl font-semibold text-neutral-100 mb-8">New Essay</h1>

  {% if error %}
    <p class="text-sm text-red-400 bg-red-400/10 border border-red-400/20 rounded px-3 py-2 mb-6">{{ error }}</p>
  {% endif %}

  <form method="post" class="flex flex-col gap-5">
    {% csrf_token %}

    <div class="flex flex-col gap-1">
      <label for="title" class="text-xs text-neutral-400 uppercase tracking-wider">Title</label>
      <input
        id="title" name="title" type="text" required
        class="font-prose bg-transparent border-b border-neutral-700 py-2 text-xl font-semibold text-neutral-100 placeholder-neutral-700 focus:outline-none focus:border-neutral-500 transition-colors"
        placeholder="Essay title"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label for="excerpt" class="text-xs text-neutral-400 uppercase tracking-wider">Excerpt <span class="text-neutral-700 normal-case">(optional)</span></label>
      <input
        id="excerpt" name="excerpt" type="text"
        class="bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-500 transition-colors"
        placeholder="A short summary shown in the feed"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label for="content" class="text-xs text-neutral-400 uppercase tracking-wider">Content</label>
      <textarea id="content" name="content"></textarea>
    </div>

    <!-- Tag input -->
    <div class="flex flex-col gap-1.5"
      x-data="{
        tags: [],
        input: '',
        addTag() {
          const name = this.input.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
          if (name && !this.tags.includes(name) && this.tags.length < 10) {
            this.tags.push(name);
          }
          this.input = '';
        },
        removeTag(i) { this.tags.splice(i, 1); },
        onKeydown(e) {
          if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); this.addTag(); }
          else if (e.key === 'Backspace' && !this.input && this.tags.length) { this.tags.pop(); }
        }
      }"
    >
      <label class="text-xs text-neutral-400 uppercase tracking-wider">
        Tags <span class="text-neutral-700 normal-case">(Enter or comma to add · max 10)</span>
      </label>

      <div
        class="flex flex-wrap gap-1.5 min-h-10 bg-neutral-800 border border-neutral-700 rounded px-2.5 py-2 focus-within:border-neutral-500 transition-colors cursor-text"
        @click="$refs.tagInput.focus()"
      >
        <template x-for="(tag, i) in tags" :key="tag">
          <span class="flex items-center gap-1 text-xs bg-neutral-700 text-neutral-300 rounded px-2 py-0.5 shrink-0">
            <span x-text="'#' + tag"></span>
            <button type="button" @click.stop="removeTag(i)" class="text-neutral-500 hover:text-neutral-100 transition-colors leading-none ml-0.5">×</button>
          </span>
        </template>
        <input
          x-ref="tagInput"
          type="text"
          x-model="input"
          @keydown="onKeydown($event)"
          @blur="addTag()"
          placeholder="add a tag..."
          class="bg-transparent text-sm text-neutral-300 placeholder-neutral-600 focus:outline-none flex-1 min-w-24 py-0.5"
        />
      </div>

      <input type="hidden" name="tag_names" :value="tags.join(',')">
    </div>

    <div class="flex items-center gap-3 pt-2 mt-2">
      <button type="submit" name="action" value="draft" class="text-sm text-neutral-400 border border-neutral-700 rounded px-4 py-2 hover:text-neutral-200 hover:border-neutral-500 transition-colors">
        Save draft
      </button>
      <button type="submit" name="action" value="publish" class="text-sm bg-neutral-100 text-neutral-900 font-medium rounded px-4 py-2 hover:bg-neutral-200 transition-colors">
        Publish
      </button>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script>
  const easyMDE = new EasyMDE({
    element: document.getElementById('content'),
    spellChecker: false,
    autofocus: false,
    placeholder: "Write your essay here...",
    toolbar: [
      "bold", "italic", "strikethrough", "|",
      "heading-1", "heading-2", "|",
      "unordered-list", "ordered-list", "quote", "|",
      "link", "|",
      {
        name: "clear-formatting",
        action: function(editor) {
          const cm = editor.codemirror;
          const sel = cm.getSelection();
          if (!sel) return;
          let t = sel;
          t = t.replace(/\*\*([^*\n]+)\*\*/g, '$1');
          t = t.replace(/__([^_\n]+)__/g, '$1');
          t = t.replace(/\*([^*\n]+)\*/g, '$1');
          t = t.replace(/_([^_\n]+)_/g, '$1');
          t = t.replace(/~~([^~\n]+)~~/g, '$1');
          t = t.replace(/`([^`\n]+)`/g, '$1');
          t = t.replace(/^#{1,6}\s+/gm, '');
          t = t.replace(/^>\s?/gm, '');
          t = t.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
          cm.replaceSelection(t);
        },
        icon: '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>',
        title: "Clear Formatting",
      },
      "|",
      "preview", "side-by-side", "fullscreen", "|",
      "guide"
    ],
    minHeight: "480px",
    status: ["lines", "words"],
  });

  document.querySelector('form').addEventListener('submit', function() {
    easyMDE.codemirror.save();
  });
</script>
{% endblock %}
