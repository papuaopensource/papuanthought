<header class="border-b border-neutral-800 sticky top-0 z-50 bg-neutral-900/95 backdrop-blur-sm">
  <nav class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-between">
    <a href="{% url 'essays:feed' %}" class="text-neutral-100 font-semibold tracking-tight text-lg">
      papuan thought
    </a>
    <div class="flex items-center gap-5 text-sm">
      {% if user.is_authenticated %}
        <a href="{% url 'interactions:notifications' %}" class="relative text-neutral-500 hover:text-neutral-200 transition-colors" aria-label="Notifications">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
          </svg>
          {% if unread_notification_count %}
            <span class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[9px] font-bold rounded-full min-w-3.5 h-3.5 flex items-center justify-center leading-none px-0.5">
              {% if unread_notification_count > 9 %}9+{% else %}{{ unread_notification_count }}{% endif %}
            </span>
          {% endif %}
        </a>
        <a href="{% url 'essays:write' %}" class="text-neutral-400 hover:text-neutral-100 transition-colors">Write</a>
        <a href="{% url 'accounts:profile' username=user.username %}" class="text-neutral-400 hover:text-neutral-100 transition-colors">My Profile</a>
        <form method="post" action="{% url 'accounts:logout' %}">
          {% csrf_token %}
          <button type="submit" class="text-neutral-500 hover:text-neutral-300 transition-colors">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'accounts:login' %}" class="text-neutral-400 hover:text-neutral-100 transition-colors">Login</a>
        <a href="{% url 'accounts:register' %}" class="bg-neutral-100 text-neutral-900 px-3 py-1 rounded text-sm font-medium hover:bg-neutral-200 transition-colors">Join</a>
      {% endif %}
    </div>
  </nav>
</header>
