{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);}());</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PapuanThought{% endblock %}</title>
  <meta name="description" content="{% block description %}An open-source platform for essays, reflections, and community writing from Papuans.{% endblock %}" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    [x-cloak] { display: none !important; }
    body { font-family: 'Onest', sans-serif; }
    .font-prose { font-family: 'Inter', sans-serif; }

    /* ── Theme tokens ──────────────────────────────── */
    :root {
      --bg-base:     #111111;
      --bg-surface:  #181818;
      --bg-compose:  #1c1c1c;
      --bg-hover:    #202020;
      --bg-active:   #252525;
      --bg-elevated: #1e1e1e;
      --bg-muted:    #2a2a2a;
      --bg-date:     #131313;
      --border-base: #252525;
      --color-body:  #d4d4d4;
    }
    [data-theme="light"] {
      --bg-base:     #f5f5f5;
      --bg-surface:  #ffffff;
      --bg-compose:  #f0f0f0;
      --bg-hover:    #ebebeb;
      --bg-active:   #e5e5e5;
      --bg-elevated: #ededed;
      --bg-muted:    #e0e0e0;
      --bg-date:     #f7f7f7;
      --border-base: #e0e0e0;
      --color-body:  #1a1a1a;
    }

    /* ── Light: text ───────────────────────────────── */
    [data-theme="light"] .text-neutral-100 { color: #1a1a1a; }
    [data-theme="light"] .text-neutral-200 { color: #2a2a2a; }
    [data-theme="light"] .text-neutral-300 { color: #3d3d3d; }
    [data-theme="light"] .text-neutral-400 { color: #5a5a5a; }
    [data-theme="light"] .text-neutral-500 { color: #737373; }
    [data-theme="light"] .text-neutral-600 { color: #919191; }
    [data-theme="light"] .text-neutral-700 { color: #b0b0b0; }
    [data-theme="light"] .hover\:text-neutral-100:hover { color: #0f0f0f; }
    [data-theme="light"] .hover\:text-neutral-200:hover { color: #1a1a1a; }
    [data-theme="light"] .hover\:text-neutral-300:hover { color: #2a2a2a; }
    [data-theme="light"] .hover\:text-white:hover        { color: #0f0f0f; }

    /* ── Light: backgrounds ────────────────────────── */
    [data-theme="light"] .bg-neutral-800              { background-color: #ebebeb; }
    [data-theme="light"] .bg-neutral-700              { background-color: #e0e0e0; }
    [data-theme="light"] .hover\:bg-neutral-800:hover { background-color: #e4e4e4; }
    [data-theme="light"] .hover\:bg-neutral-700:hover { background-color: #d8d8d8; }
    [data-theme="light"] .hover\:bg-neutral-600:hover { background-color: #cccccc; }
    /* Primary action button */
    [data-theme="light"] .bg-neutral-100              { background-color: #1a1a1a; }
    [data-theme="light"] .text-neutral-900             { color: #f0f0f0; }
    [data-theme="light"] .hover\:bg-white:hover        { background-color: #2a2a2a; }

    /* ── Light: borders ────────────────────────────── */
    [data-theme="light"] .border-neutral-700    { border-color: #d4d4d4; }
    [data-theme="light"] .border-neutral-800    { border-color: #dcdcdc; }
    [data-theme="light"] .hover\:border-neutral-500:hover  { border-color: #737373; }
    [data-theme="light"] .hover\:border-neutral-600:hover  { border-color: #919191; }
    [data-theme="light"] .focus\:border-neutral-500:focus  { border-color: #737373; }
    [data-theme="light"] .focus-within\:border-neutral-500:focus-within { border-color: #737373; }

    /* ── Light: placeholders ───────────────────────── */
    [data-theme="light"] .placeholder-neutral-700::placeholder { color: #b0b0b0; }
    [data-theme="light"] .placeholder-neutral-500::placeholder { color: #9e9e9e; }

    /* ── Scrollbar ─────────────────────────────────── */
    * { scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; }
  </style>

  {% tailwind_css %}
  {% block extra_head %}{% endblock %}
</head>
<body x-data="{
       theme: document.documentElement.getAttribute('data-theme') || 'dark',
       toggleTheme() {
         this.theme = this.theme === 'dark' ? 'light' : 'dark';
         document.documentElement.setAttribute('data-theme', this.theme);
         localStorage.setItem('theme', this.theme);
       }
     }"
      style="background-color: var(--bg-base); color: var(--color-body);">

  <!-- Top nav -->
  <header class="border-b" style="background-color: var(--bg-surface); border-color: var(--border-base);">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 flex items-center justify-between h-14">
      <a href="{% url 'commons:landing' %}" class="text-sm font-semibold text-neutral-200 hover:text-white transition-colors">
        Papuan Thought
      </a>
      <div class="flex items-center gap-2">
        {% if user.is_authenticated %}
          <a href="{% url 'essays:feed' %}"
             class="text-xs text-neutral-400 hover:text-neutral-100 px-3 py-1.5 rounded-md hover:bg-(--bg-elevated) transition-colors">
            Feed
          </a>
          <a href="{% url 'accounts:settings_profile' %}"
             class="text-xs text-neutral-400 hover:text-neutral-100 px-3 py-1.5 rounded-md hover:bg-(--bg-elevated) transition-colors">
            {{ user.first_name|default:user.username }}
          </a>
        {% else %}
          <a href="{% url 'accounts:login' %}"
             class="text-xs text-neutral-400 hover:text-neutral-100 px-3 py-1.5 rounded-md hover:bg-(--bg-elevated) transition-colors">
            Login
          </a>
          <a href="{% url 'accounts:register' %}"
             class="text-xs text-neutral-200 px-3 py-1.5 rounded-md border transition-colors hover:border-neutral-500"
             style="background-color: var(--bg-elevated); border-color: var(--border-base);">
            Join
          </a>
        {% endif %}
      </div>
    </div>
  </header>

  <!-- Content -->
  <main>
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-10">
      {% block content %}{% endblock %}
    </div>
  </main>

</body>
</html>
