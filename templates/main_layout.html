{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en" class="bg-neutral-900 text-neutral-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}The Papuan Thought Project{% endblock %}</title>
  <meta name="description" content="{% block description %}A curated social writing network for Papuan voices.{% endblock %}" />
  

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
      [x-cloak] { display: none !important; }
      body { font-family: 'Onest', sans-serif; }
  </style>

  <!-- Tailwind Style Initialize -->
  {% tailwind_css %}
  
  {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col bg-neutral-900 text-neutral-200 antialiased">

  {% include "partials/navbar.html" %}

  <!-- Content -->
  <main class="flex-1 w-full max-w-4xl mx-auto px-4 py-10">
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

</body>
</html>
